Every application that talks to a database needs a secret: a password, a connection string, an API key for a cloud database proxy. The moment that secret is hard-coded in source code, pasted into a CI environment variable, or checked into a `.env` file in a repository, it becomes a liability that will eventually be breached. **Secrets management** is the discipline of storing, distributing, rotating, and auditing those secrets safely.

## The Problem with Hard-Coded Secrets

Hard-coded database credentials appear in:

- Source files committed to version control (`.env`, `application.properties`, `config.yaml`)
- Docker images baked with environment variables
- CI/CD pipeline logs that echo environment variables during test runs
- Crash dumps and error messages that include connection strings

Any one of these leak paths can expose credentials that allow an attacker to connect directly to the database with the same privileges as the application. Because leaked credentials are often not rotated, a single leak can be exploited months or years later.

The fix is never to have secrets in those locations at all.

## Secrets Stores

A **secrets store** is a purpose-built service that stores secrets encrypted, enforces access control, provides audit logs for every secret access, and supports automatic rotation.

### HashiCorp Vault

Vault is the most widely deployed open-source secrets manager. Applications authenticate to Vault (using a cloud IAM role, Kubernetes service account, or AppRole) and receive a short-lived secret:

```bash
# Write a database password to Vault
vault kv put secret/myapp/db password="s3cr3t"

# Read it back (application does this at startup)
vault kv get -field=password secret/myapp/db
```

Vault's **database secrets engine** goes further: it generates ephemeral, per-lease credentials directly in the database and revokes them automatically when the lease expires:

```bash
# Configure Vault's database engine for PostgreSQL
vault write database/config/mydb \
  plugin_name=postgresql-database-plugin \
  connection_url="postgresql://vault_admin:{{password}}@db:5432/myapp" \
  allowed_roles="app-role"

# Vault creates and returns a temporary credential
vault read database/creds/app-role
# Key    Value
# ---    -----
# username  v-app-role-abc123
# password  A1B2-C3D4-E5F6
# lease_duration  1h
```

The application gets credentials that expire in one hour. Even if the credential is leaked, the damage window is bounded.

### Cloud-Native Secret Managers

| Provider | Service | Key feature |
|---|---|---|
| AWS | Secrets Manager | Automatic rotation for RDS; deep integration with IAM |
| GCP | Secret Manager | Version-controlled secrets; CMEK encryption |
| Azure | Key Vault | Stores secrets, keys, and certificates; HSM-backed |

AWS Secrets Manager can automatically rotate an RDS password on a schedule, updating both the Secrets Manager entry and the database password — zero manual intervention required.

```python
# Python: retrieve secret from AWS Secrets Manager at runtime
import boto3, json
client = boto3.client('secretsmanager', region_name='us-east-1')
secret = json.loads(client.get_secret_value(SecretId='myapp/db')['SecretString'])
conn_string = f"postgresql://{secret['username']}:{secret['password']}@{secret['host']}/myapp"
```

## Secret Rotation

Rotation is the practice of regularly replacing secrets with new values. Why it matters:

- Limits the damage window of a leaked secret
- Satisfies compliance requirements (PCI-DSS, SOC 2, HIPAA all mandate rotation)
- Forces validation that the rotation process actually works

### Rotation Strategies

**Zero-downtime rotation** for database passwords requires a two-phase approach:

1. **Phase 1:** Create a new password and update both the database and the secrets store. The old password is still valid.
2. **Phase 2:** After all running application instances have picked up the new secret, revoke the old password.

AWS Secrets Manager automates this for RDS via a Lambda rotation function. For self-managed databases, Vault's database engine handles it through lease renewal.

```sql
-- Manual rotation example: add new password, then revoke old
ALTER ROLE app_user PASSWORD 'new_strong_password_v2';
-- ...after confirming apps use new password...
-- (old password already overwritten above in PostgreSQL single-user model)
```

> **Avoid long-lived shared passwords.** If the same password has been used for two years and shared across teams, assume it is compromised. Rotate immediately and use Vault or a cloud secrets manager going forward.

## Environment Variables Done Right

Environment variables are better than hard-coded secrets in source, but still have risks: they can appear in `/proc`, crash dumps, and `docker inspect` output. The correct pattern:

```bash
# BAD: secret visible in shell history and process list
export DATABASE_URL="postgresql://user:password@host/db"

# BETTER: pull from secrets manager at startup, never store in env
export DATABASE_URL=$(vault kv get -field=url secret/myapp/db)
```

Better still: use a secrets manager SDK in the application and pull the secret programmatically at startup, never passing it through environment variables at all.

## Key Takeaways

- **Never hard-code secrets** in source code, Docker images, or CI/CD environment variables — a single repository leak exposes all environments simultaneously.
- Use a dedicated secrets store — **HashiCorp Vault** or a cloud-native equivalent — that provides access control, audit logs, and automatic rotation.
- Prefer **ephemeral, per-service credentials** with short TTLs over long-lived shared passwords; the breach window shrinks from years to hours.
- **Rotate regularly** and test your rotation process before an incident forces you to use it under pressure.
- Audit every secret access: who read or rotated what, and when — this is the first place you look during a security investigation.
