Analytics pipelines ingest raw events, transform them, and produce aggregated results that power dashboards and business decisions. The database design differs fundamentally from transactional systems: writes are bulk and sequential, reads scan millions of rows, and correctness means "the numbers are reproducible and auditable" rather than "no double-booking."

## Architecture Overview

A typical pipeline has three layers:

1. **Raw events** — append-only, never updated. The source of truth.
2. **Staging / intermediate** — transformed, cleansed, joined. Often recreated nightly.
3. **Aggregates / marts** — pre-computed summaries queried by dashboards.

```
[event producers] → raw_events → ETL job → fact_pageviews → agg_daily_traffic
                                              ↓
                                         dim_users, dim_pages
```

This pattern is called a **star schema**: a central **fact table** (events or transactions) surrounded by **dimension tables** (users, pages, products). Joins always go from fact to dimension — never dimension to fact.

## Schema: Web Analytics Pipeline

```sql
-- Raw events: never touch these rows after insert
CREATE TABLE raw_events (
  id         INTEGER PRIMARY KEY,
  received_at INTEGER NOT NULL,
  source     TEXT NOT NULL,       -- 'web' | 'mobile' | 'server'
  payload    TEXT NOT NULL        -- raw JSON
);

-- Dimension: users
CREATE TABLE dim_users (
  user_key     INTEGER PRIMARY KEY,
  user_id      TEXT NOT NULL,     -- natural key from source system
  email        TEXT,
  country      TEXT,
  plan         TEXT,
  valid_from   INTEGER NOT NULL,
  valid_to     INTEGER            -- NULL = current record (SCD Type 2)
);

-- Dimension: pages
CREATE TABLE dim_pages (
  page_key INTEGER PRIMARY KEY,
  url      TEXT NOT NULL,
  title    TEXT,
  section  TEXT
);

-- Fact: one row per page view
CREATE TABLE fact_pageviews (
  id          INTEGER PRIMARY KEY,
  event_time  INTEGER NOT NULL,
  user_key    INTEGER REFERENCES dim_users(user_key),
  page_key    INTEGER NOT NULL REFERENCES dim_pages(page_key),
  session_id  TEXT NOT NULL,
  duration_s  INTEGER,
  referrer    TEXT
);

-- Aggregate: pre-computed daily traffic per page
CREATE TABLE agg_daily_traffic (
  report_date  TEXT NOT NULL,   -- 'YYYY-MM-DD'
  page_key     INTEGER NOT NULL REFERENCES dim_pages(page_key),
  views        INTEGER NOT NULL DEFAULT 0,
  unique_users INTEGER NOT NULL DEFAULT 0,
  avg_duration_s REAL,
  PRIMARY KEY (report_date, page_key)
);
```

### Slowly Changing Dimensions (SCD Type 2)

When a user upgrades their plan, you don't want to retroactively rewrite all their historical page views. **SCD Type 2** solves this by adding a new row to `dim_users` with the updated plan and a new `valid_from`, while setting `valid_to` on the old row. Historical facts still point to the old `user_key` (the old plan), so reports from last month remain accurate.

## ETL: Populating the Aggregate

The nightly ETL job truncates and rebuilds `agg_daily_traffic`:

```sql
DELETE FROM agg_daily_traffic
WHERE report_date = strftime('%Y-%m-%d', 'now', '-1 day');

INSERT INTO agg_daily_traffic (report_date, page_key, views, unique_users, avg_duration_s)
SELECT
  strftime('%Y-%m-%d', datetime(f.event_time, 'unixepoch')) AS report_date,
  f.page_key,
  COUNT(*)                          AS views,
  COUNT(DISTINCT f.session_id)      AS unique_users,
  AVG(f.duration_s)                 AS avg_duration_s
FROM fact_pageviews f
WHERE f.event_time >= strftime('%s', 'now', '-1 day', 'start of day')
  AND f.event_time <  strftime('%s', 'now', 'start of day')
GROUP BY report_date, f.page_key;
```

> **Note:** Deleting and re-inserting yesterday's aggregate (rather than updating in place) is safer: if the ETL job fails halfway, you can rerun it without double-counting. This is the **idempotent ETL** principle.

## Column-Oriented Storage

Relational analytics queries read few columns but millions of rows:

```sql
SELECT SUM(duration_s), COUNT(*) FROM fact_pageviews WHERE page_key = 42;
```

Row-oriented storage (like SQLite's default) must read each full row and discard unused columns. **Column-oriented storage** (used by BigQuery, ClickHouse, DuckDB) stores each column contiguously, so the query above reads only the `duration_s` and `page_key` columns — 10–100× less I/O.

For SQLite-scale analytics, adding indexes on the columns you filter and aggregate is the pragmatic equivalent.

## Key Takeaways

- **Raw events are append-only**: they are the audit trail and can always be reprocessed.
- **Star schema** separates facts (measurements) from dimensions (context), enabling flexible slicing.
- **SCD Type 2** preserves historical accuracy when dimension attributes change over time.
- **Pre-computed aggregates** trade storage for query speed — dashboards read from `agg_*` tables, not raw facts.
- **Idempotent ETL** (delete + reinsert for a time window) makes reruns safe and the pipeline robust.
