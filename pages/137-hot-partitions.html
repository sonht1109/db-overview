When you shard a database, the goal is to spread work evenly across nodes. But data and traffic are rarely uniform. Some keys attract vastly more reads and writes than others, and the shard that holds those keys ends up doing the lion's share of the work. This is a **hot partition** (also called a **hot shard**) — and it's one of the most common performance traps in distributed databases.

## What Makes a Partition Hot?

A partition gets hot when a disproportionate fraction of requests land on it. The cause is almost always a skewed **shard key** — one whose distribution in real traffic doesn't match the distribution of key values.

Three classic patterns:

| Pattern | Example | Why it's hot |
|---|---|---|
| **Celebrity / viral row** | A tweet from a pop star; a Reddit post on the front page | Millions of reads on a single `post_id` or `user_id` |
| **Monotonic key** | `order_id` auto-increment, date-range sharding | All new writes go to the latest shard; older shards sit idle |
| **Low-cardinality shard key** | Sharding by `country_code` with 80% of users in one country | One shard is permanently overloaded by design |

The monotonic-key case deserves emphasis: if you range-shard by a timestamp or an auto-incrementing ID, *every new write* hits the same shard. The "last" shard becomes a sequential bottleneck no matter how many shards you add.

## Diagnosing a Hot Partition

Hot partitions announce themselves through symptoms that look like general overload but are actually localized:

- One node pegs CPU or disk I/O while others are under-utilized.
- Query latency spikes on a specific key range, not system-wide.
- Write queues or lock waits accumulate on one shard only.

Most distributed databases expose per-shard metrics. In systems like Cassandra or DynamoDB you can see partition-level read/write units; in PostgreSQL-based sharding setups (like Citus), you can query shard statistics directly.

## How to Fix a Hot Partition

There's no single cure — the right fix depends on whether traffic is skewed on reads, writes, or both.

### Add a Random Suffix (Write Skew)

For write-heavy hot keys, **shard key salting** spreads one logical key across multiple physical partitions. Instead of writing everything for `user_id = 42` to one shard, you append a random suffix (0–N) and distribute writes:

```sql
-- Conceptual: write to one of 4 sub-shards at random
INSERT INTO events (partition_key, user_id, event_type, ts)
VALUES (
  '42_' || (ABS(RANDOM()) % 4),  -- e.g. '42_2'
  42,
  'page_view',
  CURRENT_TIMESTAMP
);
```

The downside: reads must now query all N sub-shards and merge results. This trades write scalability for read complexity.

### Cache Hot Keys (Read Skew)

When a handful of rows are read by everyone (a trending post, a product on sale), add an **application-level cache** (Redis, Memcached) in front of the database. The shard never sees the bulk of reads.

### Re-shard with a Better Key

If the root cause is a poor shard key choice, the real fix is to pick a different one — typically a **hash** of the key rather than a range. Hash sharding scatters keys pseudo-randomly, so no single shard accumulates sequential writes or popular key ranges.

> **Note:** Re-sharding live data is expensive — it means migrating rows between nodes without downtime. This is why choosing a good shard key up front is so important. Many teams treat shard key selection as an architectural decision that's very difficult to undo.

### Use a Time-Based Expiry Strategy

For time-series or event data, some databases use **time-bucketed partitions**: instead of keeping all recent writes on the "last" shard, new partitions are pre-created and rotated on a schedule. InfluxDB, TimescaleDB, and AWS DynamoDB time-series patterns all use variants of this idea.

-- Notice user_id 999 dominates one shard.
SELECT
  user_id,
  event_type,
  (user_id % 4) AS shard_id,
  COUNT(*) OVER (PARTITION BY user_id % 4) AS events_on_shard
FROM events
ORDER BY shard_id, user_id;
-- Try: change % 4 to a different number of shards.
-- Does adding more shards help when one user_id generates most traffic?</textarea>
  </div>
</div>

The query makes the skew visible: user 999 owns nearly all events, so one shard absorbs most requests regardless of how many shards you add. That's the essence of the hot partition problem — it's a data distribution issue, not a capacity issue.
