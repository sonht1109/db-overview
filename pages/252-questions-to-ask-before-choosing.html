Picking a database without a structured evaluation is like buying a house by looking only at the photos. The listing is designed to show the best angles. The questions you ask — about the neighbourhood, the plumbing, the neighbours — are what surface the real trade-offs. The same discipline applies when evaluating databases: a short checklist of pointed questions cuts through vendor marketing and reveals whether a system actually fits your situation.

## The Seven Questions

### 1. What is the primary access pattern?

This is the most important question. Access patterns map almost directly to database categories:

| Pattern | Example | Strong fit |
|---|---|---|
| Exact key lookup | `GET session:user:42` | Key-value store |
| Range scan on ordered key | All orders from Jan–Mar | B-tree index, wide-column |
| Flexible ad-hoc queries | "All users in France who bought X" | Relational |
| Deeply nested documents | User profiles with variable fields | Document store |
| Relationship traversal | Friends of friends | Graph database |
| Time-bucketed aggregates | Avg CPU per minute for 30 days | Time-series database |
| Large analytical scans | Revenue by region, cohort analysis | Columnar / data warehouse |

A single product often has multiple access patterns — which is a reason to consider multiple specialized stores, or a reason to pick one system that handles the dominant pattern well and tolerates the rest.

### 2. What are the read/write characteristics?

- **Read-heavy (>90% reads):** Optimise for read latency; caching, read replicas, and columnar layouts all help.
- **Write-heavy:** LSM-tree engines (RocksDB, Cassandra, ScyllaDB) are optimised for high-throughput sequential writes. B-tree engines struggle above ~10K writes/second on a single node.
- **Mixed, transactional:** Relational databases with row-level locking are designed for this balance.

Transactions and bank balances demand strong consistency. Social media "like" counts can tolerate eventual consistency — being off by one for a few seconds is invisible to users. Knowing which camp your data falls into eliminates entire categories of databases.

### 4. How large is the dataset, and how fast is it growing?

- **Fits in RAM (< ~100 GB):** In-memory stores like Redis are viable and extremely fast.
- **Fits on one machine (< ~10 TB):** A well-tuned single-node relational or document database handles this comfortably.
- **Requires horizontal sharding (> 10 TB, or > ~50K writes/s):** You need a distributed database. This adds significant operational complexity and consistency trade-offs.

Growth rate matters as much as current size. A dataset that doubles every six months will cross the sharding threshold in a predictable timeline; design for it early, or plan the migration path explicitly.

### 5. What are the latency and throughput targets?

Be specific. "Fast" is not a target. These numbers drive hardware sizing and architecture:

```
p50 read latency target:  _____ ms
p99 read latency target:  _____ ms
peak read throughput:     _____ req/s
peak write throughput:    _____ req/s
acceptable downtime/year: _____ minutes (maps to SLA %)
```

### 6. What is the team's operational expertise?

A database that is theoretically optimal but that nobody on the team understands is a reliability risk. Every specialised database brings its own operational burden: backup strategy, monitoring, cluster management, failure modes, and upgrade path. PostgreSQL has two decades of documentation and community knowledge. A newer distributed database may be superior on paper and a nightmare to operate with a three-person team.

> **Honest question:** If this database wakes you up at 3 am, does your team know how to diagnose and recover from failure?

### 7. What are the schema evolution requirements?

Relational databases require schema migrations — adding a column, renaming a field, changing a type all require a planned migration step. For a stable, well-understood domain this is fine; the schema enforces correctness. For a product where the data model changes every sprint, the overhead is real. Document databases that allow schemaless writes trade that migration overhead for the risk of inconsistent data shapes across documents over time.

## Key Takeaways

- Seven questions cover the essential evaluation surface: access pattern, read/write balance, consistency, dataset size, latency targets, team expertise, and schema evolution needs.
- Consistency and access pattern together eliminate most candidates quickly.
- Operational complexity is a real cost — the best database for a given workload is not necessarily the best database for a given team.
- Write the answers to these questions down before looking at any benchmark or product page.
