Adding more machines to a database system feels like it should always make it faster — more nodes, more parallel processing, more throughput. In practice, distribution introduces coordination overhead, network latency, and consistency bookkeeping that can make a distributed system significantly slower than a well-tuned single node, especially for the wrong workload. Distribution is a solution to specific problems; it is not a general-purpose performance multiplier.

## The Myth: More Nodes = More Speed

The myth draws on a correct intuition: if one CPU can process X queries per second, ten CPUs should process 10X. That logic holds for embarrassingly parallel workloads — independent tasks with no shared state. Database workloads are almost never embarrassingly parallel. They share tables, enforce constraints, coordinate transactions, and maintain ordering guarantees.

## What Distribution Actually Adds

When you distribute a database across multiple nodes, you gain potential throughput at the cost of:

1. **Network latency** — every cross-node operation adds a round-trip. At 1 ms per hop, a transaction that touches three shards requires at minimum 3 ms of network time before any I/O.
2. **Coordination protocols** — consensus algorithms (Raft, Paxos) ensure nodes agree on the state of data. A Raft commit requires a majority of nodes to acknowledge a write before it is confirmed. More nodes = more acknowledgements = more latency.
3. **Distributed transaction overhead** — two-phase commit (2PC) coordinates writes across shards. 2PC requires two round-trips and blocks if a coordinator crashes mid-commit.
4. **Data skew and hot partitions** — if one shard handles disproportionately more traffic than others (e.g., a popular user's data), it becomes a bottleneck that cannot be solved by adding more nodes elsewhere.

## Where Distribution Does Help

Distribution is the right answer for specific, measurable problems:

- **Data volume exceeds single-node storage.** A petabyte of time-series data cannot fit on one machine; sharding is necessary.
- **Write throughput exceeds single-node capacity.** If a single PostgreSQL instance is saturated at ~200K writes/second and you need 2M/second, horizontal sharding is warranted.
- **Geographic distribution for latency.** Serving reads from a replica close to the user reduces read latency for global applications. (This is read scaling, not write scaling.)
- **High availability.** Replicas provide failover; the performance benefit is secondary to the availability benefit.

The keyword in each case is "exceeds." Distribution is a response to a *measured* bottleneck, not a preemptive architecture decision.

## The Network Is the Bottleneck

The speed of light is the fundamental limit of distributed systems. A round-trip within the same data center: ~0.5 ms. Across the US: ~70 ms. Across the Atlantic: ~150 ms. No engineering can make these numbers smaller — they are physics.

This means that cross-region transactions are always slow, regardless of how well the database is engineered. If your application needs to read-modify-write a row that spans continents in a single transaction, the minimum latency is bounded by the speed of light, not by software.

## The Hot Partition Problem

Distribution helps when load is evenly spread across shards. It doesn't help — and can make things worse — when load is skewed. If a Twitter-style social network shards by user ID and one user has 100 million followers, all activity around that user concentrates on one shard. Adding more shards doesn't help that user's shard.

Hot partition mitigation (cell-based architectures, celebrity-user special casing, read replicas for popular entities) is application-level work that distribution alone doesn't solve.

-- or requires a broadcast join (every shard queries every other shard).
SELECT u.name, SUM(o.amount) AS total_spent
FROM shard_a_users u
JOIN shard_b_orders o ON u.id = o.user_id
GROUP BY u.name
ORDER BY total_spent DESC;
-- Co-locating related data on the same shard eliminates this cost.
-- Good sharding key: shard BOTH users and orders by user_id.</textarea>

> **Key principle:** In a distributed database, co-locate data that is frequently joined or accessed together on the same shard or node. A join that crosses a shard boundary is a network call; a join within a shard is a local I/O operation. Shard key design is the most important performance decision in a sharded system.

## The Right Mental Model

Think of distribution as **partitioning a problem**, not multiplying capacity. Each shard is an independent unit that handles its slice of the data. The system is faster in aggregate only if:

1. Queries can be routed to a single shard (single-shard transactions are fast).
2. Data is evenly distributed (no hot partitions).
3. Cross-shard operations are rare or batched.

When those conditions don't hold, distribution adds overhead without adding throughput.

## Key Takeaways

- Distribution solves specific problems: data volume too large for one node, write throughput beyond single-node capacity, geographic read latency.
- It introduces coordination overhead, network latency, and two-phase commit cost that can make individual operations slower.
- Most applications are better served by a well-tuned single node than a prematurely distributed system.
- Hot partitions and cross-shard joins are distribution-specific problems with no easy solution; shard key design is critical.
- Measure first: profile your bottleneck before distributing. The most common outcome is that the bottleneck is a missing index, not insufficient nodes.
