Distributed databases need every node to agree on a single consistent state — but nodes crash, networks partition, and messages arrive late. **Raft** is a consensus algorithm designed to make this agreement tractable by reducing it to a simpler problem: elect one node as the undisputed leader, then let that leader serialize all decisions for everyone else.

## Why One Leader Simplifies Everything

When a cluster has a single authoritative leader, it can handle writes, sequence log entries, and replicate them to followers in a defined order. Followers are passive: they accept entries from the leader and acknowledge receipt. Clients always talk to the leader. No leader means no writes — and that is intentional.

This leader-centric model lets Raft avoid the complexity of multi-leader coordination at the cost of availability during a re-election window (typically 150–300 ms). Most databases built on Raft (etcd, CockroachDB, TiKV, Consul) consider this trade-off worthwhile.

## Terms, Votes, and Heartbeats

Raft divides time into **terms** — monotonically increasing integers. Every term begins with an election and (if successful) ends when the leader dies or a new term starts. Terms act like logical clocks: a node that receives a message from a higher term immediately updates its own term and steps down to follower status.

| Role | Description |
|------|-------------|
| **Leader** | Handles all client writes; sends periodic heartbeats to followers |
| **Follower** | Passive; if no heartbeat arrives before the timeout, becomes a candidate |
| **Candidate** | Asks peers for votes; wins with a majority; becomes the new leader |

**Election timeout** is the key trigger. Each follower picks a random timeout in a window (e.g., 150–300 ms). Randomness ensures two followers rarely time out simultaneously and split votes indefinitely.

When a follower's timer fires:

1. Increment local term.
2. Transition to **Candidate**.
3. Vote for self.
4. Send `RequestVote` RPCs to all other nodes.

A peer grants its vote if and only if:
- It has not voted in this term yet.
- The candidate's log is at least as up-to-date as the peer's own log (Raft's log completeness guarantee).

If a candidate collects votes from a **majority** (`⌊N/2⌋ + 1` nodes in a cluster of N), it becomes the leader and immediately sends heartbeats to suppress new elections.

## Split Votes and Safety Guarantees

With an even-sized cluster or unlucky timing, two candidates can each collect the same number of votes — a **split vote**. No one wins. Both candidates time out again (each picking a new random delay), increment the term, and restart the election. The random backoff makes split votes statistically rare and self-resolving.

Raft guarantees **election safety**: at most one leader per term. This holds because:

- Each node casts at most one vote per term.
- A majority is required to win — and two disjoint majorities cannot exist in the same cluster.

> **Note:** Raft requires a cluster of **odd-sized** node counts (3, 5, 7…) in practice. A 2-node cluster cannot tolerate any failure because you can never form a majority after losing one node.

## How Real Systems Use It

CockroachDB and TiKV partition data into **ranges** (shards), and each range runs its own independent Raft group. A 30-node cluster might run thousands of Raft groups simultaneously, each with its own leader. etcd (the backing store for Kubernetes) runs a single Raft group over all keys — simpler, but less write parallelism.

The leader of a Raft group is the sole entry point for writes to that group's data. Reads can be served by the leader (strongly consistent) or by followers (potentially stale), depending on the database's consistency configuration.

<details class="reveal"><summary>Reveal: What happens if the leader crashes mid-replication?</summary><div class="reveal-body">

If the leader crashes after appending an entry to its own log but before a majority of followers acknowledge it, the entry is **uncommitted**. The new leader elected in the next term will not apply that entry unless it was already replicated to a majority. Raft's log-matching property ensures the new leader's log is at least as complete as any committed entry — so no committed data is ever lost, and the partially-replicated entry is safely discarded or overwritten on followers.

</div></details>
