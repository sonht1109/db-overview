Key-value stores are deceptively simple — a key maps to a value, full stop. But that simplicity is exactly what makes them fast, and experienced engineers have developed a handful of recurring **design patterns** that extract surprising power from this primitive. Understanding these patterns tells you both *when* to reach for a key-value store and *how* to structure your data inside one.

## Pattern 1: Key Namespacing

Because a key-value store is one flat namespace, you need a convention to group related keys. The standard approach is **hierarchical prefixes** separated by a delimiter (`:` or `/` are most common).

| Key | Value | Purpose |
|---|---|---|
| `session:user:4291` | `{"token":"abc","exp":1719000000}` | User session |
| `cache:page:homepage` | `<rendered HTML>` | Page cache |
| `rate:ip:203.0.113.42` | `47` | Request counter |
| `lock:order:9988` | `worker-3` | Distributed lock |

This lets a single store serve multiple concerns while keeping keys predictable and debuggable. You can scan all keys matching `session:*` to find active sessions, or delete `cache:*` to flush the cache layer — most key-value stores support prefix scans or pattern matching for exactly this.

> **Note:** Namespacing is a convention enforced by your application, not the database. The store treats `session:user:4291` as an opaque string; it has no idea the `:` means anything. Document your key schema the same way you document a table schema.

## Pattern 2: TTL-Based Expiry

Key-value stores almost always support setting a **time-to-live (TTL)** on a key. After the TTL expires the key is automatically deleted — no background job, no cron, no manual cleanup.

This single feature powers three extremely common use cases:

- **Session storage** — set TTL to the session idle timeout; the session evicts itself when the user goes away.
- **Caching** — set TTL to how stale you can tolerate. The next miss regenerates the value and resets the clock.
- **Rate limiting** — store a request counter keyed on `rate:{user_id}` with a TTL of one minute. Increment on each request; reject if the counter exceeds the limit. The key self-resets each window.

## Pattern 3: Counter and Accumulator Keys

Incrementing a counter looks trivial, but doing it safely under concurrent load is not. Key-value stores expose an **atomic increment** operation (`INCR` in Redis, `update_item` with `ADD` in DynamoDB) that reads and writes the counter in a single, indivisible step — no read-modify-write race condition.

Common uses: page-view counts, API call quotas, inventory quantities (decrement on purchase), vote tallies.

Try it below. The `rate_limit` table simulates a simple counter store — each INSERT represents an incoming request, and the query checks whether any key has exceeded its limit.

<div class="widget" data-widget="sql">
  <div class="widget-head"><span>Interactive SQL · Rate-limit counter pattern</span></div>
  <div class="widget-body">
    <textarea data-setup="CREATE TABLE kv (k TEXT PRIMARY KEY, v INTEGER NOT NULL DEFAULT 0); INSERT INTO kv VALUES ('rate:user:101', 3); INSERT INTO kv VALUES ('rate:user:202', 12); INSERT INTO kv VALUES ('rate:user:303', 7); INSERT INTO kv VALUES ('rate:user:404', 0);">-- Simulate incrementing user 101's counter, then check who is over the limit (threshold = 10)
UPDATE kv SET v = v + 1 WHERE k = 'rate:user:101';

SELECT k AS user_key,
       v AS request_count,
       CASE WHEN v >= 10 THEN 'BLOCKED' ELSE 'OK' END AS status
FROM kv
ORDER BY v DESC;</textarea>
  </div>
</div>

## Pattern 4: Fan-Out and Aggregation Keys

Sometimes you want to read multiple related values together. Rather than fetching hundreds of individual keys, engineers **pre-aggregate** into a single key whose value is a small JSON blob or list — a pattern called **fan-out on write**.

A social media feed is the classic example. Instead of computing "all posts from accounts Alice follows" at read time (expensive), each new post is *written* into every follower's feed key. A read is then a single key lookup.

```
feed:user:4291  →  ["post:88","post:74","post:31", ...]   (pre-computed list)
```

The trade-off: writes become heavier (one post → many writes), but reads stay O(1). This is only sensible when reads vastly outnumber writes and follower counts stay bounded.

> **Note:** Fan-out breaks down for celebrities or accounts with millions of followers — writing one post to 10 million feed keys in real time is impractical. Real systems use a hybrid: pre-compute feeds for ordinary users, compute on-the-fly for high-follower accounts.

<details class="reveal"><summary>Reveal: Why not just store everything in one big key?</summary><div class="reveal-body">A single monolithic key becomes a bottleneck: every reader contends for the same lock, the value grows unbounded, and a single write can invalidate everything. Splitting data across many fine-grained keys distributes load across the cluster and lets TTLs be set independently per logical unit. The art is finding the right granularity — too coarse and you lose parallelism; too fine and you need too many round-trips to assemble a response.</div></details>
